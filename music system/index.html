<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SONIX — Music Player</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="noise"></div>
  <div class="grid-bg"></div>

  <!-- Real audio element -->
  <audio id="audio-player" preload="metadata"></audio>

  <div class="player-shell">

    <!-- Album Art -->
    <div class="art-section">
      <div class="vinyl-wrap">
        <div class="vinyl" id="vinyl">
          <div class="vinyl-label">
            <span class="vinyl-title" id="vinyl-title">TERE</span>
          </div>
        </div>
      </div>
      <div class="eq-bars" id="eq-bars">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <!-- Info & Controls -->
    <div class="control-section">

      <div class="track-meta">
        <div class="track-tag">NOW PLAYING</div>
        <h1 class="track-title" id="track-title">Tere Ishq Mein</h1>
        <p class="track-artist" id="track-artist">Bilal Amir, Ahmed Butt</p>
        <p class="status-msg" id="status-msg">Click ▶ to play</p>
      </div>

      <!-- Progress -->
      <div class="progress-area">
        <span class="time" id="current-time">0:00</span>
        <div class="progress-bar" id="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
          <div class="progress-thumb" id="progress-thumb"></div>
        </div>
        <span class="time" id="total-time">0:00</span>
      </div>

      <!-- Main Controls -->
      <div class="main-controls">
        <button class="ctrl-btn" id="btn-shuffle" title="Shuffle">
          <svg viewBox="0 0 24 24"><path d="M16 3h5v5l-1.8-1.8-4.6 4.6-1.4-1.4 4.6-4.6L16 3zM4 17l4.6-4.6 1.4 1.4L5.4 18.4 7.2 20H2v-5l2 1.8V17zm12.8 0l1.8 1.8V18h-5l1.8-1.8-4.6-4.6 1.4-1.4 4.6 4.6zM5.4 5.4L7.2 7H2V2l1.8 1.8 4.6 4.6-1.4 1.4L5.4 5.4z"/></svg>
        </button>
        <button class="ctrl-btn ctrl-prev" id="btn-prev" title="Previous">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn ctrl-play" id="btn-play" title="Play/Pause">
          <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg class="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl-btn ctrl-next" id="btn-next" title="Next">
          <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 4V8l-5.5 4zm7-6h2v12h-2z"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-repeat" title="Repeat">
          <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        </button>
      </div>

      <!-- Volume -->
      <div class="volume-area">
        <svg class="vol-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1-3.29-2.5-4.03v8.05c1.5-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="75"/>
        <span class="vol-label" id="vol-label">75</span>
      </div>

      <!-- Playlist -->
      <div class="playlist">
        <div class="playlist-header">QUEUE</div>
        <ul class="playlist-list" id="playlist-list"></ul>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
