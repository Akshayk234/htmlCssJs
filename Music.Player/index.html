<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/cf6159e41b.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <div class="music-player">
      <nav>
        <div class="circle">
          <i class="fa-solid fa-angle-left"></i>
        </div>
         <div class="circle">
          <i class="fa-solid fa-bars"></i>
        </div>
      </nav>
      <img src="468-thumbnail.png" class="song-image" >
      <h1>Despacito</h1>
      <p>Luis fonsi</p>

      <audio controls>
        <source src="" type="audio/mpeg">
      </audio>
      <input type="range" value="0" id="progress">
    </div>

  </div>
  
<script src="script.js"></script>
</body>
</html>
